<!DOCTYPE html>
<html lang="ru" data-theme="nothing">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Memory - Login</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script src="theme-init.js"></script>
  <link rel="stylesheet" href="themes.css?v=2">
  <style>
    /* Login page — base layout. Colors / fonts come from themes.css via CSS variables. */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-primary, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
      background: var(--bg-primary, #0f0f0f);
      color: var(--text-primary, #f5f5f5);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container { width: 100%; max-width: 400px; padding: 24px; }

    .login-card {
      background: var(--bg-secondary, #1a1a1a);
      border: 1px solid var(--border-color, #333);
      border-radius: var(--radius-lg, 16px);
      padding: 40px 32px;
      box-shadow: var(--shadow, 0 4px 20px rgba(0, 0, 0, 0.3));
    }

    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo img { width: 64px; height: 64px; margin-bottom: 12px; }
    .login-logo h1 {
      font-family: var(--font-display, var(--font-heading, inherit));
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary, #f5f5f5);
      letter-spacing: -0.02em;
    }
    .login-logo p {
      font-size: 13px;
      color: var(--text-secondary, #a0a0a0);
      margin-top: 4px;
    }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 11px;
      font-family: var(--font-mono, monospace);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary, #a0a0a0);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-tertiary, #252525);
      border: 1px solid var(--border-color, #333);
      border-radius: var(--radius-md, 0);
      color: var(--text-primary, #f5f5f5);
      font-size: 14px;
      font-family: var(--font-mono, 'SF Mono', monospace);
      transition: border-color 0.2s;
    }
    .form-group input:focus { outline: none; border-color: var(--accent-primary, #6366f1); }
    .form-group input::placeholder { color: var(--text-muted, #666); }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--accent-primary, #6366f1);
      border-radius: var(--radius-md, 0);
      color: var(--accent-primary, #6366f1);
      font-size: 12px;
      font-family: var(--font-mono, sans-serif);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .login-btn:hover {
      background: var(--accent-primary, #6366f1);
      color: var(--bg-primary, #000);
    }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .login-error {
      margin-top: 12px;
      padding: 10px 14px;
      background: rgba(215, 117, 84, 0.08);
      border: 1px solid var(--accent-primary, #ef4444);
      border-left: 3px solid var(--accent-primary, #ef4444);
      border-radius: var(--radius-md, 0);
      color: var(--accent-primary, #ef4444);
      font-size: 13px;
      display: none;
    }

    .login-agent-name {
      margin-top: 12px;
      padding: 10px 14px;
      background: rgba(74, 158, 92, 0.08);
      border: 1px solid var(--success, #4A9E5C);
      border-left: 3px solid var(--success, #4A9E5C);
      border-radius: var(--radius-md, 0);
      color: var(--success, #4A9E5C);
      font-size: 13px;
      display: none;
      text-align: center;
    }

    .login-hint {
      margin-top: 20px;
      font-size: 11px;
      font-family: var(--font-mono, monospace);
      color: var(--text-muted, #666);
      text-align: center;
      line-height: 1.6;
    }

    .login-divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      gap: 12px;
      color: var(--text-muted, #666);
      font-size: 11px;
      font-family: var(--font-mono, monospace);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color, #333);
    }

    .login-viewer-btn {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid var(--border-color, #333);
      border-radius: var(--radius-md, 0);
      color: var(--text-secondary, #a0a0a0);
      font-size: 12px;
      font-family: var(--font-mono, sans-serif);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .login-viewer-btn:hover {
      border-color: var(--text-primary, #fff);
      color: var(--text-primary, #fff);
    }

    /* Nothing-specific: dot-matrix on login background too */
    [data-theme="nothing"] body {
      background-color: #000000;
      background-image: radial-gradient(circle, #1A1A1A 1px, transparent 1px);
      background-size: 16px 16px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <img src="favicon.svg" alt="Team Memory">
        <h1>Team Memory</h1>
        <p>Dashboard</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="token-input">API Token</label>
          <input
            type="password"
            id="token-input"
            placeholder="tm_... или master token"
            autocomplete="off"
            spellcheck="false"
          >
        </div>

        <button type="submit" class="login-btn" id="login-btn">Войти</button>

        <div class="login-error" id="login-error"></div>
        <div class="login-agent-name" id="login-agent-name"></div>
      </form>

      <div id="viewer-section" style="display:none">
        <div class="login-divider">или</div>
        <button class="login-viewer-btn" id="viewer-btn">Продолжить без входа (только просмотр)</button>
      </div>

      <div class="login-hint">
        Получите токен у администратора сервера<br>
        или используйте master token из конфигурации
      </div>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
