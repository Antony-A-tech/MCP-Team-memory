<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Memory - Login</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #252525;
      --text-primary: #f5f5f5;
      --text-secondary: #a0a0a0;
      --text-muted: #666;
      --border-color: #333;
      --accent-primary: #6366f1;
      --accent-hover: #4f46e5;
      --danger: #ef4444;
      --radius-md: 10px;
      --radius-lg: 16px;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }

    .login-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      box-shadow: var(--shadow);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo img {
      width: 64px;
      height: 64px;
      margin-bottom: 12px;
    }

    .login-logo h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .login-logo p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 14px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent-primary);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
    }

    .login-btn {
      width: 100%;
      padding: 10px;
      background: var(--accent-primary);
      border: none;
      border-radius: var(--radius-md);
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-btn:hover {
      background: var(--accent-hover);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .login-error {
      margin-top: 12px;
      padding: 10px 14px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: var(--radius-md);
      color: var(--danger);
      font-size: 13px;
      display: none;
    }

    .login-agent-name {
      margin-top: 12px;
      padding: 10px 14px;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: var(--radius-md);
      color: var(--accent-primary);
      font-size: 13px;
      display: none;
      text-align: center;
    }

    .login-hint {
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <img src="favicon.svg" alt="Team Memory">
        <h1>Team Memory</h1>
        <p>Dashboard</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="token-input">API Token</label>
          <input
            type="password"
            id="token-input"
            placeholder="tm_... или master token"
            autocomplete="off"
            spellcheck="false"
          >
        </div>

        <button type="submit" class="login-btn" id="login-btn">Войти</button>

        <div class="login-error" id="login-error"></div>
        <div class="login-agent-name" id="login-agent-name"></div>
      </form>

      <div class="login-hint">
        Получите токен у администратора сервера<br>
        или используйте master token из конфигурации
      </div>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
